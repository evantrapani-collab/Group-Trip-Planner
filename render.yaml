# Render Blueprint — https://render.com/docs/blueprint-spec
# In the Render dashboard: New + → Blueprint → connect this repo.
# Render reads this file and provisions the service + persistent disk.
services:
  - type: web
    name: triptogether
    runtime: docker
    dockerfilePath: ./Dockerfile
    # The free instance type has NO persistent disk, so trips would be lost on
    # restart. "starter" (~$7/mo) enables the disk below. To trial for free,
    # remove the `disk:` block and `plan:` line — data will reset on redeploy.
    plan: starter
    healthCheckPath: /
    envVars:
      - key: TRIP_DB
        value: /data/trips.db
    disk:
      name: trip-data
      mountPath: /data
      sizeGB: 1
