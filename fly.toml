# Fly.io config — free allowance includes a small persistent volume.
# Setup (one time):
#   fly launch --no-deploy --copy-config --name <your-unique-name>
#   fly volumes create trip_data --size 1 --region iad
#   fly deploy
app = "triptogether"
primary_region = "iad"

[build]

[env]
  PORT = "3000"
  TRIP_DB = "/data/trips.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "trip_data"
  destination = "/data"
